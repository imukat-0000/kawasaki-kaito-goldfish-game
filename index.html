<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#172b20">
  <meta name="description" content="河﨑海斗 夏季キャンペーン 金魚育成ゲーム">
  <title>河﨑海斗 | 金魚育成ゲーム</title>
  <link rel="icon" href="assets/goldfish_sprite.png" type="image/png">
  <link rel="stylesheet" href="style.css?v=20260717-perch6">
</head>
<body>
  <main class="page-shell">
    <header class="campaign-header">
      <p class="campaign-kicker">KAWASAKI KAITO SUMMER CAMPAIGN</p>
      <h1>金魚育成ゲーム</h1>
    </header>

    <section class="game-frame" aria-label="みんなで育てる金魚の桶">
      <div class="game-screen" id="gameScreen">
        <img class="scene" id="scene" src="assets/tub_base.png" alt="夏祭り会場の金魚桶">

        <div class="ambient-scene" aria-hidden="true">
          <div class="ambient-object foliage-object foliage-left"></div>
          <div class="ambient-object foliage-object foliage-right"></div>
          <div class="ambient-object lantern-object lantern-one"></div>
          <div class="ambient-object lantern-object lantern-two"></div>
          <div class="ambient-object lantern-object lantern-three"></div>
          <div class="ambient-object lantern-object lantern-four"></div>
        </div>

        <div class="background-fireworks" id="fireworks" aria-hidden="true"></div>

        <div class="scanlines" aria-hidden="true"></div>

        <div class="hud hud-total">
          <span class="hud-label">GROWTH COUNT</span>
          <strong id="totalCount">---</strong>
        </div>

        <div class="hud hud-level">
          <span class="hud-label">STAGE</span>
          <strong id="stageLabel">01</strong>
        </div>

        <div class="source-breakdown" aria-label="アクセス元の内訳">
          <span>QR <strong id="qrCount">---</strong></span>
          <span>SNS <strong id="snsCount">---</strong></span>
        </div>

        <div class="fish-pond" id="fishPond" aria-hidden="true"></div>
        <div class="visitor-layer" id="visitorLayer" aria-hidden="true"></div>

        <p class="thank-you-message" id="thankYouMessage" role="status" aria-live="polite" aria-hidden="true">Thank you !</p>

        <div class="celebration" id="celebration" aria-hidden="true">
          <div class="celebration-banner"><span id="milestoneLabel">100 FISH!</span></div>
          <div class="bonodori-effect">
            <img class="bonodori-yagura" src="assets/bonodori-v2-samples/yagura-two-tier.png" alt="">
            <img class="bonodori-drummer" src="assets/bonodori-v2-samples/frog-drummer.png" alt="">
            <img class="bonodori-dancer dancer-goldfish dancer-one" src="assets/bonodori-v2-samples/goldfish-yukata-dancer.png" alt="">
            <img class="bonodori-dancer dancer-koi dancer-two" src="assets/bonodori-v2-samples/koi-yukata-dancer.png" alt="">
            <img class="bonodori-dancer dancer-frog dancer-three" src="assets/bonodori-v2-samples/frog-yukata-dancer.png" alt="">
            <img class="bonodori-dancer dancer-goldfish dancer-four" src="assets/bonodori-v2-samples/goldfish-yukata-dancer.png" alt="">
            <img class="bonodori-dancer dancer-koi dancer-five" src="assets/bonodori-v2-samples/koi-yukata-dancer.png" alt="">
            <img class="bonodori-dancer dancer-frog dancer-six" src="assets/bonodori-v2-samples/frog-yukata-dancer.png" alt="">
          </div>
        </div>

        <div class="progress-hud">
          <div class="progress-copy">
            <span>NEXT EVOLUTION</span>
            <strong id="progressLabel">--- / ---</strong>
          </div>
          <div class="progress-track" role="progressbar" aria-label="次の進化までの成長" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="progressTrack">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>

        <p class="status-message" id="statusMessage" role="status">CONNECTING...</p>
      </div>
    </section>

    <footer class="campaign-footer">
      <p>みんなのアクセスで、金魚が育つ。</p>
      <p class="source-note" id="sourceNote">通常アクセス</p>
    </footer>
  </main>

  <script src="script.js?v=20260717-perch6"></script>
</body>
</html>
