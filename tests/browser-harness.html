<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <base href="../">
  <title>Goldfish game browser test harness</title>
  <link rel="icon" href="assets/goldfish_sprite.png" type="image/png">
  <link rel="stylesheet" href="../style.css?v=20260721-growth-branches2">
  <script>
    const testParams = new URLSearchParams(window.location.search);
    const testMode = testParams.get("mode") || "success";
    window.__disableLiveRefresh = testMode !== "live-refresh";

    if (testParams.get("reset") === "1") {
      localStorage.removeItem("counter_last_success");
    }

    if (testMode.endsWith("-cache")) {
      localStorage.setItem("counter_last_success", JSON.stringify({
        nfc: 42,
        total: 42,
        savedAt: Date.now()
      }));
    }

    if (testMode === "storage-error") {
      Storage.prototype.getItem = () => { throw new Error("storage unavailable"); };
      Storage.prototype.setItem = () => { throw new Error("storage unavailable"); };
    }

    window.__fetchCalls = 0;
    window.__lastFetchUrl = "";
    window.fetch = (url, options = {}) => {
      window.__fetchCalls += 1;
      window.__lastFetchUrl = String(url);
      document.documentElement.dataset.fetchCalls = String(window.__fetchCalls);
      document.documentElement.dataset.lastFetchUrl = window.__lastFetchUrl;

      if (testMode.startsWith("failure")) {
        return Promise.reject(new TypeError("mock network failure"));
      }

      if (testMode.startsWith("timeout")) {
        return new Promise((resolve, reject) => {
          options.signal?.addEventListener("abort", () => {
            reject(new DOMException("mock timeout", "AbortError"));
          });
        });
      }

      const payload = testMode === "invalid"
        ? { nfc: 2, total: 9 }
        : { nfc: 5, total: 5 };
      return Promise.resolve({
        ok: true,
        status: 200,
        json: () => Promise.resolve(payload)
      });
    };
  </script>
</head>
<body>
  <main class="page-shell">
    <header class="campaign-header">
      <p class="campaign-kicker">BROWSER TEST</p>
      <h1>金魚育成ゲーム</h1>
    </header>
    <section class="game-frame" aria-label="テスト用の金魚桶">
      <div class="game-screen" id="gameScreen">
        <img class="scene" id="scene" src="../assets/tub_base.png" alt="テスト用の金魚桶">
        <div class="stage-scene-layers" id="stageSceneLayers" aria-hidden="true">
          <img class="stage-layer stage-layer-background" id="stageLayerBackground" alt="">
          <img class="stage-layer stage-layer-midground" id="stageLayerMidground" alt="">
          <img class="stage-layer stage-layer-tub" id="stageLayerTub" alt="">
        </div>
        <img class="camera-transition" id="cameraTransition" src="../assets/tub_base.png" alt="">
        <div class="world-layer world-background">
          <div class="ambient-scene" aria-hidden="true"></div>
          <div class="background-fireworks" id="fireworks" aria-hidden="true"></div>
        </div>
        <div class="hud hud-total"><span class="hud-label">GROWTH COUNT</span><strong id="totalCount">---</strong></div>
        <div class="hud hud-level"><span class="hud-label">STAGE</span><strong id="stageLabel">01</strong></div>
        <div class="source-breakdown"><span>NFC <strong id="nfcCount">---</strong></span></div>
        <div class="world-layer world-creatures">
          <div class="fish-pond" id="fishPond" aria-hidden="true"></div>
        </div>
        <div class="world-layer world-visitors">
          <div class="visitor-layer" id="visitorLayer" aria-hidden="true"></div>
        </div>
        <img class="stage-tub-foreground" id="stageTubForeground" alt="" aria-hidden="true">
        <div class="people-layer" id="peopleLayer" aria-hidden="true"></div>
        <img class="stage-lower-foreground" id="stageLowerForeground" alt="" aria-hidden="true">
        <p class="thank-you-message" id="thankYouMessage" role="status" aria-live="polite" aria-hidden="true">Thank you !</p>
        <div class="celebration" id="celebration" aria-hidden="true">
          <div class="celebration-banner"><span id="milestoneLabel">100 FISH!</span></div>
          <div class="bonodori-effect">
            <img class="bonodori-yagura" src="assets/bonodori-v2-samples/yagura-two-tier.png" alt="">
            <img class="bonodori-drummer" src="assets/bonodori-v2-samples/frog-drummer.png" alt="">
            <img class="bonodori-dancer dancer-goldfish dancer-one" src="assets/bonodori-v2-samples/goldfish-yukata-dancer.png" alt="">
            <img class="bonodori-dancer dancer-koi dancer-two" src="assets/bonodori-v2-samples/koi-yukata-dancer.png" alt="">
            <img class="bonodori-dancer dancer-frog dancer-three" src="assets/bonodori-v2-samples/frog-yukata-dancer.png" alt="">
            <img class="bonodori-dancer dancer-goldfish dancer-four" src="assets/bonodori-v2-samples/goldfish-yukata-dancer.png" alt="">
            <img class="bonodori-dancer dancer-koi dancer-five" src="assets/bonodori-v2-samples/koi-yukata-dancer.png" alt="">
            <img class="bonodori-dancer dancer-frog dancer-six" src="assets/bonodori-v2-samples/frog-yukata-dancer.png" alt="">
          </div>
        </div>
        <div class="progress-hud">
          <div class="progress-copy"><span>NEXT EVOLUTION</span><strong id="progressLabel">--- / ---</strong></div>
          <div class="progress-track" role="progressbar" aria-label="次の進化までの成長" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="progressTrack"><div class="progress-fill" id="progressFill"></div></div>
        </div>
        <p class="status-message" id="statusMessage" role="status">CONNECTING...</p>
      </div>
    </section>
    <footer class="campaign-footer"><p>browser test</p><p class="source-note" id="sourceNote">通常アクセス</p></footer>
  </main>
  <script src="../script.js?v=20260722-nfc-count1"></script>
</body>
</html>
